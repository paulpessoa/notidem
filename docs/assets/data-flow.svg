<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Notidem end-to-end data flow</title>
  <desc>How data moves through Notidem: post or conversation text is read in the page, sent to the isolated background worker, and forwarded directly to the AI provider the user chose. The API key never reaches the LinkedIn page and no data passes through any Notidem server.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="22" font-weight="600" fill="#1d2226">How your data flows through Notidem</text>
  <text x="40" y="64" font-size="14" fill="#5F5E5A">Read in the page, processed by you, sent only to the AI provider you choose. No Notidem server in the path.</text>

  <!-- Zone 1: LinkedIn page -->
  <rect x="40" y="92" width="380" height="210" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="60" y="118" font-size="14" font-weight="600" fill="#0C447C">LinkedIn page (browser tab)</text>

  <rect x="62" y="134" width="336" height="48" rx="8" fill="#fff" stroke="#85B7EB" stroke-width="1"/>
  <text x="78" y="154" font-size="13.5" font-weight="600" fill="#0C447C">1. You open a post or a chat</text>
  <text x="78" y="171" font-size="12" fill="#185FA5">Notidem button appears by the box</text>

  <rect x="62" y="190" width="336" height="48" rx="8" fill="#fff" stroke="#85B7EB" stroke-width="1"/>
  <text x="78" y="210" font-size="13.5" font-weight="600" fill="#0C447C">2. Content script reads visible text</text>
  <text x="78" y="227" font-size="12" fill="#185FA5">Post text, or the conversation transcript</text>

  <rect x="62" y="246" width="336" height="44" rx="8" fill="#fff" stroke="#85B7EB" stroke-width="1"/>
  <text x="78" y="266" font-size="13.5" font-weight="600" fill="#0C447C">No API key is ever present here</text>
  <text x="78" y="282" font-size="12" fill="#185FA5">The page cannot read your key</text>

  <!-- Zone 2: Background worker -->
  <rect x="250" y="338" width="360" height="180" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="270" y="364" font-size="14" font-weight="600" fill="#085041">Notidem background worker (isolated)</text>

  <rect x="272" y="380" width="316" height="50" rx="8" fill="#fff" stroke="#5DCAA5" stroke-width="1"/>
  <text x="288" y="401" font-size="13.5" font-weight="600" fill="#085041">3. Builds the prompt with your profile</text>
  <text x="288" y="418" font-size="12" fill="#0F6E56">Key decrypted in memory, used once</text>

  <rect x="272" y="440" width="316" height="50" rx="8" fill="#fff" stroke="#5DCAA5" stroke-width="1"/>
  <text x="288" y="461" font-size="13.5" font-weight="600" fill="#085041">4. Calls the AI provider directly</text>
  <text x="288" y="478" font-size="12" fill="#0F6E56">HTTPS, key in the request header only</text>

  <!-- Zone 3: storage -->
  <rect x="40" y="338" width="180" height="180" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="60" y="364" font-size="14" font-weight="600" fill="#2C2C2A">Local storage</text>
  <text x="60" y="388" font-size="12" fill="#444441">Your device only.</text>
  <text x="60" y="406" font-size="12" fill="#444441">Encrypted at rest</text>
  <text x="60" y="424" font-size="12" fill="#444441">(AES-GCM).</text>
  <text x="60" y="448" font-size="12" fill="#444441">Never synced to</text>
  <text x="60" y="466" font-size="12" fill="#444441">the cloud.</text>
  <text x="60" y="494" font-size="12" fill="#444441">Profile, key, history.</text>

  <!-- Zone 4: AI provider -->
  <rect x="640" y="338" width="200" height="180" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="660" y="364" font-size="14" font-weight="600" fill="#3C3489">AI provider</text>
  <text x="660" y="388" font-size="12" fill="#26215C">You choose: OpenAI,</text>
  <text x="660" y="406" font-size="12" fill="#26215C">Anthropic, Gemini,</text>
  <text x="660" y="424" font-size="12" fill="#26215C">or Groq.</text>
  <text x="660" y="452" font-size="12" fill="#26215C">5. Returns a draft.</text>
  <text x="660" y="476" font-size="12" fill="#26215C">You review, edit,</text>
  <text x="660" y="494" font-size="12" fill="#26215C">and post it yourself.</text>

  <!-- Arrows -->
  <line x1="230" y1="302" x2="230" y2="378" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="244" y="332" font-size="11.5" fill="#5F5E5A">text only</text>

  <line x1="250" y1="408" x2="222" y2="408" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="120" y="332" font-size="11.5" fill="#5F5E5A">reads key</text>
  <line x1="150" y1="338" x2="200" y2="392" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/>

  <line x1="610" y1="450" x2="638" y2="450" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="612" y="440" font-size="11.5" fill="#5F5E5A">prompt</text>

  <path d="M740 338 C 740 240, 470 230, 420 234" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="486" y="214" font-size="11.5" fill="#5F5E5A">draft comes back to you</text>

  <text x="40" y="544" font-size="11.5" fill="#888780">No Notidem server sits in this path. We never see your key, your text, or your drafts.</text>
</svg>
